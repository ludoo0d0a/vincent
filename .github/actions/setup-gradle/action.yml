name: 'Setup Gradle'
description: 'Set up Temurin JDK and Gradle (with caching) for KMP/Android builds'

inputs:
  java-version:
    description: 'JDK version for the build'
    required: false
    default: '21'
  gradle-version:
    description: 'Gradle version when wrapper jar is not committed'
    required: false
    default: '8.13'

runs:
  using: 'composite'
  steps:
    - name: Set up JDK
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: ${{ inputs.java-version }}

    - name: Set up Gradle
      uses: gradle/actions/setup-gradle@v4
      with:
        gradle-version: ${{ inputs.gradle-version }}
