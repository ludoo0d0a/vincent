name: 'Setup Gradle'
description: 'Set up Temurin JDK 17 and Gradle (with caching) for the build'

# Composite action — per the Kotlin Multiplatform GitHub Actions guide:
# https://kotlinlang.org/docs/multiplatform/github-actions-for-kmp.html
# gradle-version is pinned because the binary Gradle wrapper jar is not committed,
# so a standalone `gradle` is provisioned on PATH (call `gradle …`, not `./gradlew`).
runs:
  using: 'composite'
  steps:
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Set up Gradle
      uses: gradle/actions/setup-gradle@v4
      with:
        gradle-version: '8.13'
