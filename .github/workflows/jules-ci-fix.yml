name: Jules — Fix CI failure

on:
  workflow_run:
    workflows: ["Android CI"]
    types: [completed]

concurrency:
  group: jules-ci-fix-${{ github.event.workflow_run.head_branch }}
  cancel-in-progress: true

jobs:
  fix:
    if: >
      github.event.workflow_run.conclusion == 'failure' &&
      github.event.workflow_run.event == 'pull_request' &&
      github.event.workflow_run.repository.full_name == github.repository
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read
      pull-requests: write

    steps:
      - name: Comment on failing PR
        uses: actions/github-script@v7
        with:
          script: |
            const run = context.payload.workflow_run;
            const prs = run.pull_requests ?? [];
            if (prs.length === 0) {
              core.info('No associated pull request found; skipping comment.');
              return;
            }

            const prNumber = prs[0].number;
            const body = [
              '## CI Android échoué — Jules invoqué',
              '',
              `Branche : \`${run.head_branch}\``,
              `Commit : \`${run.head_sha}\``,
              `Run CI : ${run.html_url}`,
              '',
              'Une session Jules a été lancée pour analyser l\'échec et ouvrir une PR de correctif.',
            ].join('\n');

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              body,
            });

      - name: Invoke Jules
        uses: google-labs-code/jules-invoke@v1
        with:
          jules_api_key: ${{ secrets.JULES_API_KEY }}
          starting_branch: ${{ github.event.workflow_run.head_branch }}
          include_last_commit: true
          prompt: |
            The "Android CI" workflow has failed on branch ${{ github.event.workflow_run.head_branch }}.

            **Failed run:** ${{ github.event.workflow_run.html_url }}
            **Commit:** ${{ github.event.workflow_run.head_sha }}

            Project context:
            - Kotlin Multiplatform Android app (Compose)
            - Module: composeApp
            - CI builds via geoking-ci reusable workflow (assembleDebug)

            Please:
            1. Analyze the CI failure from the workflow run logs
            2. Identify the root cause (Gradle/Kotlin compilation, dependencies, lint)
            3. Implement a minimal, targeted fix
            4. Verify the fix would pass assembleDebug

            Constraints:
            - Do not modify secrets, keystore, or google-services.json
            - Keep changes focused; no unrelated refactors
            - In the fix PR description, note that it addresses the CI failure on branch `${{ github.event.workflow_run.head_branch }}`
