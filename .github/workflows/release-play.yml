name: Release to Play Store

on:
  push:
    tags: [ 'v*' ]
  workflow_dispatch:
    inputs:
      track:
        description: 'Play Store track'
        default: internal
        type: choice
        options: [ internal, alpha, beta, production ]

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Gradle
        uses: ./.github/actions/setup-gradle

      - name: Decode signing keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: echo "$KEYSTORE_BASE64" | base64 --decode > "$RUNNER_TEMP/release.keystore"

      - name: Build signed AAB
        env:
          KEYSTORE_FILE: ${{ runner.temp }}/release.keystore
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          # Play requires an ever-increasing versionCode; tie it to the run number.
          VERSION_CODE: ${{ github.run_number }}
          VERSION_NAME: ${{ github.ref_name }}
        run: gradle :composeApp:bundleRelease --no-daemon --stacktrace

      - name: Upload to Google Play
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: com.vincent
          releaseFiles: composeApp/build/outputs/bundle/release/composeApp-release.aab
          track: ${{ github.event.inputs.track || 'internal' }}
          status: completed
