name: Release to Play Store

on:
  push:
    branches: [ main ]   # every push to main → deploy to the internal track
    tags: [ 'v*' ]
  workflow_dispatch:
    inputs:
      track:
        description: 'Play Store track'
        default: internal
        type: choice
        options: [ internal, alpha, beta, production ]

# Serialize deploys: a Play edit must finish before the next starts.
concurrency:
  group: play-release
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Gradle
        uses: ./.github/actions/setup-gradle

      - name: Decode signing keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: echo "$KEYSTORE_BASE64" | base64 --decode > "$RUNNER_TEMP/release.keystore"

      - name: Build signed AAB
        env:
          KEYSTORE_FILE: ${{ runner.temp }}/release.keystore
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          # Play requires an ever-increasing versionCode; tie it to the run number.
          VERSION_CODE: ${{ github.run_number }}
          # Tag pushes use the tag as versionName; otherwise blank → build reads
          # playstore/version.properties.
          VERSION_NAME: ${{ github.ref_type == 'tag' && github.ref_name || '' }}
        run: gradle :composeApp:bundleRelease --no-daemon --stacktrace

      - name: Generate Play release notes (from playstore/whatsnew.xml)
        run: python3 scripts/whatsnew.py "${{ github.run_number }}"

      - name: Upload to Google Play
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: com.geoking.vincent
          releaseFiles: composeApp/build/outputs/bundle/release/composeApp-release.aab
          whatsNewDirectory: playstore/whatsnew
          track: ${{ github.event.inputs.track || 'internal' }}
          status: completed
