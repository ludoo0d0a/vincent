name: Release to Play Store

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  workflow_dispatch:
    inputs:
      track:
        description: 'Play Store track'
        default: internal
        type: choice
        options: [ internal, alpha, beta, production ]
      changesNotSentForReview:
        description: 'Skip auto-review (only for brand-new apps before first Console review)'
        default: false
        type: boolean

concurrency:
  group: play-release
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Gradle
        uses: ./.github/actions/setup-gradle

      - name: Decode google-services.json (Firebase)
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: echo "$GOOGLE_SERVICES_JSON" | base64 --decode > composeApp/google-services.json

      - name: Decode signing keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: echo "$KEYSTORE_BASE64" | base64 --decode > "$RUNNER_TEMP/release.keystore"

      - name: Print upload-key SHA-1 (OAuth Android client)
        env:
          KEYSTORE_FILE: ${{ runner.temp }}/release.keystore
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
        run: |
          SHA1="$(keytool -list -v -keystore "$KEYSTORE_FILE" -alias "$KEY_ALIAS" -storepass "$KEYSTORE_PASSWORD" \
            | awk -F'SHA1: ' '/SHA1:/{print $2; exit}')"
          echo "Upload-key SHA-1 (add to OAuth Android client if missing): $SHA1"

      - name: Build signed AAB
        env:
          KEYSTORE_FILE: ${{ runner.temp }}/release.keystore
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          WEB_CLIENT_ID: ${{ secrets.WEB_CLIENT_ID }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          VERSION_CODE: ${{ github.run_number }}
          VERSION_NAME: ${{ github.ref_type == 'tag' && github.ref_name || '' }}
        run: gradle :composeApp:bundleRelease --no-daemon --stacktrace

      - name: Generate Play release notes (from playstore/whatsnew.xml)
        env:
          GK_PROJECT_ROOT: ${{ github.workspace }}
        run: python3 scripts/whatsnew.py "${{ github.run_number }}"

      - name: Upload to Google Play (skip review)
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.changesNotSentForReview == true
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: fr.geoking.vincent
          releaseFiles: composeApp/build/outputs/bundle/release/composeApp-release.aab
          whatsNewDirectory: playstore/whatsnew
          track: ${{ github.event.inputs.track || 'internal' }}
          status: completed
          changesNotSentForReview: true

      - name: Upload to Google Play
        if: github.event_name != 'workflow_dispatch' || github.event.inputs.changesNotSentForReview != true
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: fr.geoking.vincent
          releaseFiles: composeApp/build/outputs/bundle/release/composeApp-release.aab
          whatsNewDirectory: playstore/whatsnew
          track: ${{ github.event.inputs.track || 'internal' }}
          status: completed
