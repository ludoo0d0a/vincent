name: Deploy AI proxy Worker

on:
  push:
    branches: [main]
    paths:
      - 'worker/**'
      - '.github/workflows/cloudflare-worker.yml'
  workflow_dispatch:

concurrency:
  group: cloudflare-worker
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: worker
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      # (Re)upload GEMINI_API_KEY as a Worker Secret from the GitHub secret, so the
      # key is never committed and CI stays the source of truth. Uses the latest
      # wrangler via `npx wrangler` (no pinned version).
      - name: Upload GEMINI_API_KEY secret
        run: printf '%s' "$GEMINI_API_KEY" | npx --yes wrangler@latest secret put GEMINI_API_KEY
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      - name: Deploy worker
        run: npx --yes wrangler@latest deploy
